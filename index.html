<!DOCTYPE html>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            /* תמונת רקע בצבע המקורי שלה */
            background-image: url('final.jpg');
            background-size: cover;

        /* התיבות בצדדים ובמרכז עם רקע לבן שקוף כדי שהטקסט יבלוט */
        .side-box, .center-box {
            background: rgba(255, 255, 255, 0.85); /* לבן עם 85% אטימות */

            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px); /* מוסיף אפקט טשטוש קל מאחורי התיבה - נראה מאוד הייטקי */
