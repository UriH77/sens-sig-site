<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sens-Sig | Strategic Tech Partnerships</title>
    <style>
        /* הגדרות כלליות */
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            /* רקע - וודא ששם התמונה מדויק */
            background: url('final.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* הגדרת התיבות - כאן הבטחנו שהן יהיו גלויות */
        .side-box, .center-box {
            position: relative; /* מבטיח שהן מעל הרקע */
            z-index: 10;
            background: rgba(255, 255, 255, 0.92); /* לבן כמעט מלא לקריאות מקסימלית */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px); /* אפקט זכוכית יוקרתי */
        }

        .side-box { width: 230px; text-align: center; }
        .center-box { width: 400px; text-align: center; border: 3px solid #1a365d; }

        h1 { color: #1a365d; font-size: 3em; margin: 0 0 10px 0; letter-spacing: -1px; }
        h3 { color: #2b6cb0; font-size: 1.3em; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }

        .item { display: block; margin: 15px 0; font-weight: 700; color: #2d3748; font-size: 1.05em; }

        .contact-btn {
            display: inline-block;
            background: #2b6cb0;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.3s ease;
        }
        .contact-btn:hover { background: #1a365d; transform: scale(1.05); }

        .personal-note { font-style: italic; color: #4a5568; margin-top: 20px; font-size: 1em; font-weight: 500; }
    </style>
</head>
<body>

    <div class="side-box">
        <h3>Expertise</h3>
        <span class="item">WiFi Sensing</span>
        <span class="item">AI Analytics</span>
        <span class="item">VMS Integration</span>
    </div>

    <div class="center-box">
        <h1>Sens-Sig</h1>
        <p style="font-weight: 600; color: #2d3748; font-size: 1.1em;">
            Strategic Tech Partnerships<br>Market Entry Specialist
        </p>
        <div class="personal-note">Led by Uri Hemo</div>
    </div>

    <div class="side-box">
        <h3>Network</h3>
        <span class="item">Telecom Specialist</span>
        <span class="item">Israeli Carriers</span>
        <a href="mailto:uri.hemo@sens-sig.com" class="contact-btn">Contact Uri</a>
    </div>

</body>
</html>
